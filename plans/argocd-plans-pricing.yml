specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Argo CD
providerId: argocd
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - DevOps
  - GitOps
  - Kubernetes
  - CNCF
  - Open Source
  - Plans
description: >-
  Argo CD is open-source software (Apache License 2.0) and a CNCF Graduated project. There is no commercial billing surface published by the Argo CD project itself — the software is free to download, install, and run. Commercial offerings (managed Argo CD, support, enterprise add-ons) are provided by 3rd-party vendors such as Akuity, Codefresh (now Octopus Deploy), and the major Kubernetes distributions, each with their own published price lists. Those vendor plans are not part of this Argo CD profile.
notes: >-
  Open source — no commercial billing surface; commercial offerings are handled by 3rd parties (notably Akuity for managed Argo CD). reconciled=false indicates that no pricing applies to the upstream Argo CD project rather than that the data is incomplete.
sources:
  - https://argo-cd.readthedocs.io/
  - https://github.com/argoproj/argo-cd/blob/master/LICENSE
  - https://www.cncf.io/projects/argo/
plans:
  - id: argocd-open-source
    name: Open Source (Apache 2.0)
    type: free
    description: >-
      Argo CD is licensed under Apache License 2.0 and is freely available to install and operate. The project does not charge any license fee. Users provide their own Kubernetes infrastructure and operational support.
    entries:
      - label: License
        name: license
        type: flat
        metric: cluster
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 0
        currency: USD
        userMultiplied: false
    elements:
      - name: Apache 2.0 License
      - name: CNCF Graduated Project
      - name: All Features Included
  - id: argocd-third-party-managed
    name: Third-Party Managed (Reference)
    type: external
    description: >-
      Several third-party vendors offer managed or supported Argo CD with separate pricing — most notably Akuity Platform (managed Argo CD), and various Kubernetes distributions that bundle Argo CD support. Pricing is set and disclosed by those vendors, not by the Argo CD project.
    entries:
      - label: Vendor-Set Pricing
        name: vendor_pricing
        type: external
        metric: vendor
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: see_vendor
        currency: USD
        userMultiplied: false
    elements:
      - name: Akuity Platform
      - name: Codefresh (Octopus Deploy)
      - name: Kubernetes Distribution Vendors
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
