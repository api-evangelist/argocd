  - type: http
    namespace: server-clusterservice
    baseUri: ''
    description: Consolidate Services — ClusterService business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-clusters
      path: /api/v1/clusters
      operations:
      - name: clusterservicelist
        method: GET
        description: List returns list of clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: server
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: id.type
          in: query
          type: string
          description: type is the type of the specified cluster identifier ( "server" - default, "name" ).
        - name: id.value
          in: query
          type: string
          description: value holds the cluster server URL or cluster name.
      - name: clusterservicecreate
        method: POST
        description: Create creates a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
        - name: upsert
          in: query
          type: boolean
    - name: api-v1-clusters-id.value
      path: /api/v1/clusters/{id.value}
      operations:
      - name: clusterserviceget
        method: GET
        description: Get returns a cluster by server address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.value
          in: path
          type: string
          description: value holds the cluster server URL or cluster name
          required: true
        - name: server
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: id.type
          in: query
          type: string
          description: type is the type of the specified cluster identifier ( "server" - default, "name" ).
      - name: clusterserviceupdate
        method: PUT
        description: Update updates a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.value
          in: path
          type: string
          description: value holds the cluster server URL or cluster name
          required: true
        - name: body
          in: body
          type: string
          required: true
        - name: updatedFields
          in: query
          type: array
        - name: id.type
          in: query
          type: string
          description: type is the type of the specified cluster identifier ( "server" - default, "name" ).
      - name: clusterservicedelete
        method: DELETE
        description: Delete deletes a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.value
          in: path
          type: string
          description: value holds the cluster server URL or cluster name
          required: true
        - name: server
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: id.type
          in: query
          type: string
          description: type is the type of the specified cluster identifier ( "server" - default, "name" ).
    - name: api-v1-clusters-id.value-invalidate-cache
      path: /api/v1/clusters/{id.value}/invalidate-cache
      operations:
      - name: clusterserviceinvalidatecache
        method: POST
        description: InvalidateCache invalidates cluster cache
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.value
          in: path
          type: string
          description: value holds the cluster server URL or cluster name
          required: true
    - name: api-v1-clusters-id.value-rotate-auth
      path: /api/v1/clusters/{id.value}/rotate-auth
      operations:
      - name: clusterservicerotateauth
        method: POST
        description: RotateAuth rotates the bearer token used for a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.value
          in: path
          type: string
          description: value holds the cluster server URL or cluster name
          required: true
