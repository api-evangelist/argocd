        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo.repo
          in: path
          type: string
          description: Repo contains the URL to the remote repository
          required: true
        - name: body
          in: body
          type: string
          required: true
    - name: api-v1-repositories-repo
      path: /api/v1/repositories/{repo}
      operations:
      - name: repositoryserviceget
        method: GET
        description: Get returns a repository or its credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          description: Repo URL for query
          required: true
        - name: forceRefresh
          in: query
          type: boolean
          description: Whether to force a cache refresh on repo's connection state.
