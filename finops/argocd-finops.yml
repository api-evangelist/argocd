  - name: Codefresh (Octopus Deploy)
    type: managed-argocd
    url: https://codefresh.io/
    note: GitOps platform built on Argo CD and Argo Workflows.
  - name: Kubernetes Distribution Bundles
    type: bundled-support
    url: https://www.cncf.io/projects/argo/
    note: Argo CD is bundled and supported by major Kubernetes distributions; pricing varies by vendor.
