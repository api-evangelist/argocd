description: >-
  Argo CD is open-source software (Apache License 2.0). There is no commercial billing surface published by the Argo CD project itself — there are no invoices, no metered usage charges, and no subscription fees attributable to Argo CD. Operating costs flow entirely through the operator's own infrastructure providers (Kubernetes cluster compute, storage, networking, monitoring, and ingress). Commercial managed offerings exist (e.g., Akuity Platform, Codefresh/Octopus Deploy, Kubernetes distribution vendors) and have their own billing surfaces that should be profiled against the third-party vendor — not Argo CD.
notes: >-
  Open source — no commercial billing surface; commercial offerings handled by 3rd parties (Akuity for Argo CD). reconciled=false explicitly indicates that no Argo CD-issued bill exists rather than incomplete data. The principles below describe how to FinOps-manage the underlying infrastructure cost of operating self-hosted Argo CD.
