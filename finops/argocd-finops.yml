principles:
  - name: Visibility
    description: >-
      No Argo CD invoice exists. Treat self-hosted Argo CD as a Kubernetes workload — its cost is the underlying compute (argocd-server, application-controller, repo-server, redis, ApplicationSet controller, notifications controller pods), persistent storage, ingress/load-balancer hours, and observability resources, all of which appear on the cloud provider's FOCUS-formatted bill.
  - name: Allocation
    description: >-
      Tag Argo CD namespace resources by environment / cost-center via Kubernetes labels and propagate them to your cloud-provider tagging strategy. If running multiple Argo CD instances per tenant, allocate by namespace.
  - name: Optimization
    description: >-
      Right-size argocd-server, repo-server, and application-controller replicas; shard the application-controller for very large fleets; tune cache expiration; consider running Argo CD on Spot/Preemptible nodes; consolidate small instances into a single multi-tenant control-plane deployment.
  - name: Accountability
    description: >-
      Assign a platform-engineering owner; review monthly Kubernetes-cluster cost attributable to argocd namespaces; if commercial managed Argo CD is being considered (e.g., Akuity), benchmark its monthly fee against the operational + opportunity cost of self-hosting.
commercialOfferings:
